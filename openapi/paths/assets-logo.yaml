post:
  tags:
    - Assets
  summary: Upload a logo
  description: |
    Uploads an image file to use as a center logo in QR codes. The returned `logoId`
    can be passed as `branding.logoId` when creating a static or dynamic QR code.

    **Accepted formats:** PNG, JPG, SVG
    **Maximum file size:** 2 MB

    Logos are scoped to the authenticated user and can be reused across multiple QR codes.
    The server scales the logo automatically to occupy at most 20% of the QR code area.
  operationId: uploadLogo
  security:
    - firebase_jwt: []
    - api_key: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - file
          properties:
            file:
              description: 'The logo image file to upload. Accepted formats: PNG, JPG, SVG. Maximum size: 2 MB.'
              type: string
              format: binary
  responses:
    '201':
      description: Logo uploaded successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Logo.yaml
          example:
            logoId: logo_xyz789
            filename: company-logo.png
            previewUrl: 'https://cdn.qrapid.io/logos/logo_xyz789.png'
            createdAt: '2026-02-18T12:00:00Z'
    '400':
      description: Invalid file (unsupported format, file too large, or no file provided).
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yaml
          examples:
            unsupported_format:
              summary: Unsupported file format
              value:
                type: 'https://qrapid.io/errors/unsupported-file-format'
                title: Unsupported file format
                status: 400
                detail: 'Only PNG, JPG, and SVG files are accepted. Received: image/gif.'
            file_too_large:
              summary: File exceeds size limit
              value:
                type: 'https://qrapid.io/errors/file-too-large'
                title: File too large
                status: 400
                detail: 'The uploaded file is 3.2 MB, which exceeds the 2 MB limit.'
    '401':
      description: >
        Unauthorized. Either the token is missing/invalid, or the user account
        has not been provisioned yet. Check the `code` field to distinguish:
        - No `code` field → missing or invalid token
        - `code: user_not_provisioned` → call `GET /me` first, then retry
      content:
        application/problem+json:
          schema:
            oneOf:
              - $ref: ../components/schemas/Problem.yaml
              - $ref: ../components/schemas/UserNotProvisionedError.yaml
          examples:
            unauthenticated:
              summary: Missing or invalid token
              value:
                type: about:blank
                title: Unauthorized
                status: 401
                detail: 'auth: unauthenticated request'
            unprovisioned:
              summary: Valid token but account not provisioned
              value:
                type: about:blank
                title: Unauthorized
                status: 401
                detail: call GET /me to provision your account
                code: user_not_provisioned
