post:
  tags:
    - Assets
  summary: Initiate a logo upload
  description: |
    Registers a new logo asset and returns a pre-signed PUT URL for uploading the
    file directly to storage. The returned `logoId` can be passed as
    `branding.logoId` when creating a static or dynamic QR code.

    **Accepted formats:** PNG, JPG, SVG
    **Maximum file size:** 2 MB

    ## Upload flow

    1. Call `POST /assets/logo` with the filename and content type.
    2. Receive a `201` response containing `logoId` and a short-lived `uploadUrl`.
    3. `PUT <uploadUrl>` with the raw file bytes as the request body and a
       `Content-Type` header matching the value you provided. Do **not** use
       `multipart/form-data` — send the raw bytes directly.
    4. Once the upload is complete, call `GET /assets/logo/{logoId}` to obtain a
       fresh pre-signed URL for displaying or verifying the image.

    Logos are scoped to the authenticated user and can be reused across multiple
    QR codes. The server scales the logo automatically to occupy at most 20% of
    the QR code area.
  operationId: uploadLogo
  security:
    - firebase_jwt: []
    - api_key: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/LogoCreateRequest.yaml
        example:
          filename: company-logo.png
          contentType: image/png
  responses:
    '201':
      description: Logo record created. Use `uploadUrl` to upload the file directly to storage.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Logo.yaml
          example:
            logoId: logo_xyz789
            filename: company-logo.png
            uploadUrl: 'https://storage.qrapid.io/logos/logo_xyz789.png?X-Amz-Signature=abc123'
            expiresAt: '2026-02-18T12:15:00Z'
            createdAt: '2026-02-18T12:00:00Z'
    '400':
      description: Invalid request (unsupported content type or missing required fields).
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/Problem.yaml
          examples:
            unsupported_content_type:
              summary: Unsupported content type
              value:
                type: 'https://qrapid.io/errors/unsupported-file-format'
                title: Unsupported file format
                status: 400
                detail: 'Only image/png, image/jpeg, and image/svg+xml are accepted. Received: image/gif.'
    '401':
      $ref: ../components/responses/Unauthorized.yaml
