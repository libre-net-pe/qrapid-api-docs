description: Response returned when fetching a logo. Contains a fresh pre-signed GET URL to download or display the logo image.
type: object
required:
  - logoId
  - filename
  - downloadUrl
  - expiresAt
  - createdAt
properties:
  logoId:
    description: Unique identifier for the logo, prefixed with `logo_`.
    type: string
    example: logo_xyz789
  filename:
    description: Original filename of the uploaded logo image.
    type: string
    example: company-logo.png
  downloadUrl:
    description: Pre-signed GET URL to download or display the logo image. Valid for the duration indicated by `expiresAt`. Fetch a new URL by calling this endpoint again once it expires.
    type: string
    format: uri
    example: 'https://storage.qrapid.io/logos/logo_xyz789.png?X-Amz-Signature=def456'
  expiresAt:
    description: ISO 8601 timestamp indicating when the `downloadUrl` expires.
    type: string
    format: date-time
    example: '2026-02-18T12:15:00Z'
  createdAt:
    description: ISO 8601 timestamp of when the logo was originally uploaded.
    type: string
    format: date-time
    example: '2026-02-18T12:00:00Z'
