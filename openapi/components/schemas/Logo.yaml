description: Response returned after initiating a logo upload. Contains a pre-signed POST URL and signed form fields the client uses to upload the file directly to storage.
type: object
required:
  - logoId
  - filename
  - uploadUrl
  - uploadFields
  - expiresAt
  - createdAt
properties:
  logoId:
    description: Unique identifier for the logo, prefixed with `logo_`. Pass this as `branding.logoId` when creating a QR code.
    type: string
    example: logo_xyz789
  filename:
    description: Original filename provided in the upload request.
    type: string
    example: company-logo.png
  uploadUrl:
    description: Pre-signed POST URL to upload the file directly to storage. Valid for the duration indicated by `expiresAt`. Submit a `multipart/form-data` POST request with all `uploadFields` entries as form fields (before the file) and the file bytes as the `file` field.
    type: string
    format: uri
    example: 'https://storage.qrapid.io/logos/logo_xyz789.png'
  uploadFields:
    type: object
    additionalProperties:
      type: string
    description: >
      Key-value pairs that must be included as form fields when uploading
      the file to S3. Submit as multipart/form-data with these fields
      appearing before the file bytes.
    example:
      key: logos/logo_01J...
      X-Amz-Algorithm: AWS4-HMAC-SHA256
      X-Amz-Credential: AKIA.../20260307/us-east-1/s3/aws4_request
      X-Amz-Date: 20260307T000000Z
      X-Amz-Signature: abc123...
      policy: eyJleH...
  expiresAt:
    description: ISO 8601 timestamp indicating when the `uploadUrl` expires. Upload must be completed before this time.
    type: string
    format: date-time
    example: '2026-02-18T12:15:00Z'
  createdAt:
    description: ISO 8601 timestamp of when the logo record was created.
    type: string
    format: date-time
    example: '2026-02-18T12:00:00Z'
