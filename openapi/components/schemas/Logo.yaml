description: Response returned after initiating a logo upload. Contains a pre-signed PUT URL the client uses to upload the file directly to storage.
type: object
required:
  - logoId
  - filename
  - uploadUrl
  - expiresAt
  - createdAt
properties:
  logoId:
    description: Unique identifier for the logo, prefixed with `logo_`. Pass this as `branding.logoId` when creating a QR code.
    type: string
    example: logo_xyz789
  filename:
    description: Original filename provided in the upload request.
    type: string
    example: company-logo.png
  uploadUrl:
    description: >
      Pre-signed PUT URL to upload the file directly to storage.
      Valid for the duration indicated by `expiresAt`.
      Send a PUT request with the raw file bytes as the body and
      a `Content-Type` header matching the value provided in the upload request.
    type: string
    format: uri
    example: 'https://storage.qrapid.io/logos/logo_xyz789.png?X-Amz-Signature=abc123'
  expiresAt:
    description: ISO 8601 timestamp indicating when the `uploadUrl` expires. Upload must be completed before this time.
    type: string
    format: date-time
    example: '2026-02-18T12:15:00Z'
  createdAt:
    description: ISO 8601 timestamp of when the logo record was created.
    type: string
    format: date-time
    example: '2026-02-18T12:00:00Z'
